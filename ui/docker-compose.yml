services:
  # Flask Backend API
  backend:
    build:
      context: ..
      dockerfile: ui/Dockerfile.backend
    container_name: talking-heads-backend
    ports:
      - "8001:8001"
    environment:
      - UI_API_PORT=8001
      - FLASK_ENV=development
      - PYTHONPATH=/workspace
      - PYTHONUNBUFFERED=1
    volumes:
      - ..:/workspace
      - ./server.py:/workspace/ui/server.py
    working_dir: /workspace/ui
    command: python server.py
    depends_on: []

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: talking-heads-frontend
    ports:
      - "3001:3000"  # Map container 3000 to host 3001
    environment:
      - REACT_APP_API_URL=http://localhost:8001/api
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - .:/app
      - /app/node_modules
    command: npm start
    depends_on:
      - backend

networks:
  default:
    name: talking-heads-ui

